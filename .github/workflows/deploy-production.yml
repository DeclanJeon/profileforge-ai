name: Deploy production

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: profileforge-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to ponslink
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Build standalone release
        run: bun run build

      - name: Add release metadata
        run: |
          printf '%s\n' '${{ github.sha }}' > .next/standalone/RELEASE_COMMIT
          node -e "console.log(require('./package.json').version)" > .next/standalone/RELEASE_VERSION

      - name: Upload release bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PONSLINK_HOST }}
          username: ${{ secrets.PONSLINK_USER }}
          key: ${{ secrets.PONSLINK_SSH_KEY }}
          port: ${{ secrets.PONSLINK_PORT || 22 }}
          source: '.next/standalone/*'
          target: '/home/declan/apps/profileforge/releases/${{ github.run_number }}-${{ github.sha }}'
          strip_components: 2

      - name: Activate release
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PONSLINK_HOST }}
          username: ${{ secrets.PONSLINK_USER }}
          key: ${{ secrets.PONSLINK_SSH_KEY }}
          port: ${{ secrets.PONSLINK_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            RELEASE_DIR="/home/declan/apps/profileforge/releases/${{ github.run_number }}-${{ github.sha }}"
            cd "$RELEASE_DIR"
            mkdir -p public/uploads
            rm -rf db public/uploads
            ln -s /home/declan/apps/profileforge/shared/db db
            ln -s /home/declan/apps/profileforge/shared/uploads public/uploads
            node scripts/profileforge-production.mjs --check
            ln -sfn "$RELEASE_DIR" /home/declan/apps/profileforge/current
            sudo systemctl restart profileforge.service
            sudo systemctl restart profileforge-cleanup.timer || true
            sudo systemctl status profileforge.service --no-pager
